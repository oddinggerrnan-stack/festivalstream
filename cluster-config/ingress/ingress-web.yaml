apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-web-client
  namespace: web-client
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - host: www.festivalstream.nl
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: web-client-svc
            port:
              number: 80
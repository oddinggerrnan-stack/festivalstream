apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: node-exporter
        static_configs:
          - targets:
              - node-exporter:9100

      - job_name: kube-state-metrics
        static_configs:
          - targets:
              - kube-state-metrics:8080

    storage:
      tsdb:
        retention_time: 24h

  alerts.yml: |
    groups:
      - name: test-alerts
        rules:
          - alert: TestEmailAlert
            expr: vector(1)
            for: 1m
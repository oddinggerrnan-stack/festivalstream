apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: streaming-app-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: test-streaming-app   # Koppel dit aan de naam van je Deployment
  minReplicas: 2               # Minimaal aantal pods (bij rust)
  maxReplicas: 10              # Maximaal aantal pods (bij drukte)
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70 # Schaal op als de gemiddelde CPU boven de 70% komt
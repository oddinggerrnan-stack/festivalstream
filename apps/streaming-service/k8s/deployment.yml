apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-streaming-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: streaming
  template:
    metadata:
      labels:
        app: streaming
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: democratic-csi-truenas
  namespace: argocd 
spec:
  project: default
  source:
    repoURL: 'https://democratic-csi.github.io/charts/' 
    chart: democratic-csi
    targetRevision: 0.14.0 
    helm:
      values: |
        csiDriver:
          name: "org.democratic-csi.nfs"
        
        driver:
          config:
            driver: freenas-nfs

        httpConnection:
          protocol: "http"
          host: "192.168.30.0"
          port: 80
          apiKey: 1-rrvwA7HIfNDOOYE2ME6Xa0kX0GDaj9GqpMgUavw6aulJHNCL5hkr04aX6CQMOmnZ
          allowInsecure: true

        zfs:
          datasetParentName: "/mnt/persistent-storage"
          netshareProvider:
            shareHost: "192.168.30.0"
            shareAlldirs: false
            shareAllowedHosts: []
            shareAllowedNetworks:
              - "192.168.20.0/24" 
            shareMaprootUser: "root"
            shareMaprootGroup: "root"

        storageClasses:
          - name: storage-pvc
            defaultClass: false
            reclaimPolicy: Delete
            volumeBindingMode: Immediate
            allowVolumeExpansion: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: persistent-storage 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    createNamespace: true 